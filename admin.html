<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Atelier NILAR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif;}
        :root{--black:#0a0a0a;--black-soft:#141414;--gold:#c5a059;--gold-light:#e8c875;--gold-dark:#9a7b3c;--text:#f7f4ee;--text-muted:rgba(247,244,238,0.6);--danger:#c2410c;--success:#22c55e;}
        body{background:var(--black);min-height:100vh;}
        
        .app-layout{display:flex;min-height:100vh;}
        
        .sidebar{width:280px;background:linear-gradient(180deg,var(--black),var(--black-soft));color:var(--text);padding:25px 20px;position:fixed;height:100vh;overflow-y:auto;z-index:100;border-right:1px solid rgba(197,160,89,0.15);}
        
        .sidebar-logo{width:80px;height:80px;margin:0 auto 20px;border-radius:50%;overflow:hidden;background:var(--black);border:2px solid var(--gold);}
        .sidebar-logo img{width:100%;height:100%;object-fit:cover;}
        
        .sidebar-title{font-size:22px;text-align:center;font-weight:700;margin-bottom:5px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .sidebar-subtitle{font-size:11px;text-align:center;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:30px;}
        
        .menu-title{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin:25px 0 10px;padding-left:12px;font-weight:600;}
        
        .menu-link{display:flex;align-items:center;gap:12px;padding:14px 16px;color:var(--text-muted);text-decoration:none;border-radius:12px;margin-bottom:4px;transition:all 0.3s;font-size:14px;}
        .menu-link:hover{background:rgba(197,160,89,0.1);color:var(--text);}
        .menu-link.active{background:var(--gold);color:var(--black);font-weight:600;}
        
        .user-section{margin-top:auto;padding-top:25px;border-top:1px solid rgba(197,160,89,0.15);}
        .user-email{font-size:12px;color:var(--text-muted);margin-bottom:15px;}
        
        .logout-btn{width:100%;padding:14px;background:transparent;color:var(--text-muted);border:1px solid rgba(197,160,89,0.3);border-radius:12px;cursor:pointer;font-weight:600;transition:all 0.3s;}
        .logout-btn:hover{background:var(--gold);color:var(--black);border-color:var(--gold);}
        
        .main{flex:1;margin-left:280px;padding:30px 35px;background:var(--black);}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;}
        .page-title{font-size:32px;color:var(--text);font-weight:700;font-family:'Cormorant Garamond',serif;}
        .user-display{color:var(--text-muted);font-size:14px;}
        .menu-toggle{display:none;padding:14px;background:var(--black-soft);color:var(--gold);border:1px solid var(--gold);border-radius:12px;cursor:pointer;font-size:20px;}
        
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:35px;}
        .stat-card{background:var(--black-soft);padding:28px;border-radius:20px;border:1px solid rgba(197,160,89,0.15);}
        .stat-value{font-size:42px;font-weight:800;color:var(--gold-light);font-family:'Cormorant Garamond',serif;}
        .stat-label{color:var(--text-muted);font-size:13px;margin-top:8px;text-transform:uppercase;}
        
        .card{background:var(--black-soft);padding:28px;border-radius:20px;border:1px solid rgba(197,160,89,0.15);}
        .card-title{font-size:18px;font-weight:700;margin-bottom:22px;color:var(--text);}
        
        table{width:100%;border-collapse:collapse;}
        th,td{padding:16px 14px;text-align:left;border-bottom:1px solid rgba(197,160,89,0.1);}
        th{font-size:10px;text-transform:uppercase;color:var(--text-muted);}
        
        .badge{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;}
        .badge-admin{background:var(--gold-dark);color:var(--black);}
        .badge-user{background:rgba(197,160,89,0.2);color:var(--gold-light);}
        .badge-active{background:rgba(34,197,94,0.2);color:#22c55e;}
        .badge-banned{background:rgba(194,65,12,0.2);color:var(--danger);}
        
        .btn-action{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;margin-right:5px;font-size:12px;}
        .btn-rol{background:var(--gold);color:var(--black);font-weight:600;}
        .btn-ban{background:var(--danger);color:white;}
        .btn-unban{background:var(--success);color:white;}
        .btn-delete{background:#333;color:var(--text-muted);}
        
        .spinner{width:50px;height:50px;border:3px solid rgba(197,160,89,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        #loading{position:fixed;inset:0;background:rgba(10,10,10,0.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        #loading.hidden{display:none;}
        .loading-text{color:var(--gold);margin-top:20px;font-size:14px;letter-spacing:2px;text-transform:uppercase;}
        
        @media(max-width:900px){
            .sidebar{transform:translateX(-100%);width:280px;transition:transform 0.3s;}
            .sidebar.open{transform:translateX(0);}
            .main{margin-left:0;padding:25px 20px;}
            .menu-toggle{display:block;}
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading"><div class="spinner"></div><div class="loading-text">Conectando a NILAR...</div></div>
    
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><img src="assets/logo.jpeg"></div>
            <div class="sidebar-title">Atelier NILAR</div>
            <div class="sidebar-subtitle">Moda y Estilo</div>
            
            <div class="menu-title">Principal</div>
            <a href="dashboard.html" class="menu-link">📊 Dashboard</a>
            
            <div class="menu-title">Gestión</div>
            <a href="clientes.html" class="menu-link">👥 Clientes</a>
            <a href="productos.html" class="menu-link">📦 Productos</a>
            <a href="ventas.html" class="menu-link">💰 Ventas</a>
            <a href="compras.html" class="menu-link">🛒 Compras</a>
            
            <div class="menu-title">Operaciones</div>
            <a href="inventario.html" class="menu-link">📋 Inventario</a>
            <a href="distribuciones.html" class="menu-link">🚚 Distribución</a>
            
            <div class="menu-title">Sistema</div>
            <a href="admin.html" class="menu-link active">⚙️ Admin</a>
            
            <div class="user-section">
                <div class="user-email" id="userEmail">Cargando...</div>
                <button class="logout-btn" id="btnCerrar">Cerrar Sesión</button>
            </div>
        </aside>
        
        <main class="main">
            <div class="header">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">Administración</h1>
                <span class="user-display" id="userDisplay"></span>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">Total Usuarios</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="usersActive">0</div>
                    <div class="stat-label">Activos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="admins">0</div>
                    <div class="stat-label">Administradores</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">👥 Gestión de Usuarios</div>
                <table>
                    <thead><tr><th>Email</th><th>Rol</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script type="module">
        import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import{getFirestore,collection,getDocs,setDoc,doc,updateDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config={apiKey:"AIzaSyB-uiv9yD-NB3Ex288Qb37Du5VgKKuDyfo",authDomain:"nilaratelier.firebaseapp.com",projectId:"nilaratelier",storageBucket:"nilaratelier.firebasestorage.app",messagingSenderId:"914021817740",appId:"1:914021817740:web:fc5c1ff57c1caa3f42caa9"};
        
        const app=initializeApp(config);
        const auth=getAuth(app);
        const db=getFirestore(app);
        let users=[],uid=null;
        
        // ✅ Toggle sidebar
        window.toggleSidebar=()=>document.getElementById('sidebar').classList.toggle('open');
        
        // ✅ Cerrar sesión
        document.getElementById('btnCerrar').addEventListener('click',async()=>{
            await signOut(auth);
            location.href='index.html';
        });
        
        // Verificar sesión
        onAuthStateChanged(auth,async user=>{
            if(!user){location.href='index.html';return}
            uid=user.uid;
            document.getElementById('userEmail').textContent=user.email;
            document.getElementById('userDisplay').textContent=user.email;
            await loadUsers();
        });
        
        // Cargar usuarios
        async function loadUsers(){
            try{
                let snap=await getDocs(collection(db,'usuarios'));
                users=snap.docs.map(d=>({id:d.id,...d.data()}));
                
                // Auto-crear admin si no existe
                if(!users.find(u=>u.id===uid)){
                    await setDoc(doc(db,'usuarios',uid),{email:document.getElementById('userEmail').textContent,rol:'admin',activo:true,fecha:new Date().toISOString()});
                    snap=await getDocs(collection(db,'usuarios'));
                    users=snap.docs.map(d=>({id:d.id,...d.data()}));
                }
                render();
            }catch(e){
                console.log(e);
            }finally{
                document.getElementById('loading').classList.add('hidden');
            }
        }
        
        // Render tabla
        function render(){
            document.getElementById('totalUsers').textContent=users.length;
            document.getElementById('usersActive').textContent=users.filter(u=>u.activo!==false).length;
            document.getElementById('admins').textContent=users.filter(u=>u.rol==='admin').length;
            
            const tbody=document.getElementById('tabla');
            if(!users.length){tbody.innerHTML='<tr><td colspan="4">Sin usuarios</td></tr>';return}
            
            tbody.innerHTML=users.map(u=>`<tr>
                <td>${u.email}</td>
                <td><span class="badge ${u.rol==='admin'?'badge-admin':'badge-user'}">${u.rol||'usuario'}</span></td>
                <td><span class="badge ${u.activo!==false?'badge-active':'badge-banned'}">${u.activo!==false?'Activo':'Bloqueado'}</span></td>
                <td>${u.id===uid?'<span style="color:#666">(Tú)</span>':`
                    <button class="btn-action btn-rol" onclick="action('rol','${u.id}')">${u.rol==='admin'?'👤':'⚙️'}</button>
                    <button class="btn-action ${u.activo!==false?'btn-ban':'btn-unban'}" onclick="action('${u.activo!==false?'ban':'desban'}','${u.id}')">${u.activo!==false?'🔒':'🔓'}</button>
                    <button class="btn-action btn-delete" onclick="action('del','${u.id}')">🗑️</button>`}</td>
            </tr>`).join('');
        }
        
        // ✅ Acciones
        window.action=async(ac,id)=>{
            const u=users.find(x=>x.id===id);
            if(!u)return;
            if(ac==='del'&&!confirm('¿Eliminar usuario?'))return;
            if((ac==='rol'||ac==='ban'||ac==='desban')&&!confirm('¿Confirmar acción?'))return;
            try{
                if(ac==='del')await deleteDoc(doc(db,'usuarios',id));
                if(ac==='rol')await updateDoc(doc(db,'usuarios',id),{rol:u.rol==='admin'?'usuario':'admin'});
                if(ac==='ban')await updateDoc(doc(db,'usuarios',id),{activo:false});
                if(ac==='desban')await updateDoc(doc(db,'usuarios',id),{activo:true});
                await loadUsers();
            }catch(e){alert('Error: '+e.message);}
        };
    </script>
</body>
</html>
