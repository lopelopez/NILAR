<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug | NILAR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:monospace;background:#0a0a0a;color:#c5a059;padding:20px}
        h1{color:#fff;margin:20px 0}
        .box{background:#141414;padding:20px;border-radius:10px;margin-bottom:20px}
        .error{color:#c2410c;padding:15px;background:rgba(194,65,12,0.2);border-radius:8px}
        .ok{color:#22c55e;padding:15px;background:rgba(34,197,94,0.2);border-radius:8px}
        pre{color:#888;white-space:pre-wrap}
    </style>
</head>
<body>
    <h1>🔍 Debug NILAR</h1>
    <div id="output"></div>
    
    <script type="module">
        import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import{getFirestore,collection,getDocs,setDoc,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config={apiKey:"AIzaSyB-uiv9yD-NB3Ex288Qb37Du5VgKKuDyfo",authDomain:"nilaratelier.firebaseapp.com",projectId:"nilaratelier",storageBucket:"nilaratelier.firebasestorage.app",messagingSenderId:"914021817740",appId:"1:914021817740:web:fc5c1ff57c1caa3f42caa9"};
        
        const app=initializeApp(config);
        const auth=getAuth(app);
        const db=getFirestore(app);
        
        const out=document.getElementById('output');
        
        function log(msg, tipo=''){
            out.innerHTML+=`<div class="${tipo}">${msg}</div>`;
        }
        
        onAuthStateChanged(auth,async user=>{
            if(!user){
                log('❌ No hay usuario. Redirigiendo...','error');
                setTimeout(()=>location.href='index.html',1500);
                return;
            }
            
            log('✅ Usuario: '+user.email);
            log('📛 UID: '+user.uid);
            
            try{
                // 1. Ver todos los usuarios
                log('📂 Leyendo colección "usuarios"...');
                const snap=await getDocs(collection(db,'usuarios'));
                log('   Total documentos: '+snap.size);
                
                let found=false;
                for(let d of snap.docs){
                    const data=d.data();
                    log(`   - ${d.id} => ${data.email} [${data.rol}] activo:${data.activo}`);
                    if(d.id===user.uid){
                        found=true;
                        log('   ⭐ ¡ESTE ES TU USUARIO!','ok');
                        if(data.activo===false){
                            log('   ❌ PERO activo=false!','error');
                        }
                    }
                }
                
                if(!found){
                    log('❌ NO ESTÁS en Firestore','error');
                    log('📝 Creándote como admin...');
                    
                    await setDoc(doc(db,'usuarios',user.uid),{
                        email:user.email,
                        rol:'admin',
                        activo:true,
                        fecha:new Date().toISOString()
                    });
                    
                    log('✅ ¡CREADO! Ahora funciona.','ok');
                    setTimeout(()=>location.href='dashboard.html',2000);
                }else{
                    log('✅Tienes acceso. Redireccionando...','ok');
                    setTimeout(()=>location.href='dashboard.html',1500);
                }
            }catch(e){
                log('❌ Error: '+e.message,'error');
                log('   Código: '+e.code,'error');
            }
        });
    </script>
</body>
</html>
