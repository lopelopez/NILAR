<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier NILAR | Moda y Estilo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        
        :root {
            --bg: #0f1419;
            --primary: #c5a059;
            --secondary: #e8c875;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.5);
            --border: rgba(255,255,255,0.1);
        }
        
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', -apple-system, sans-serif;
        }
        
        .bg-fondo {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(197,160,89,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(154,123,60,0.12) 0%, transparent 50%);
            z-index: 0;
        }
        
        .login-container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            position: relative;
            z-index: 10;
            margin: 15px;
        }
        
        .logo { 
            width: 80px; 
            height: 80px; 
            margin: 0 auto 15px; 
            border-radius: 50%; 
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .title span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: var(--muted);
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .form-box { display: none; width: 100%; }
        .form-box.active { display: block; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text);
            transition: all 0.25s;
        }
        
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        
        .form-group input:focus {
            outline: none;
            background: rgba(255,255,255,0.06);
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 10px;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #0a0a0a;
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197,160,89,0.3); }
        
        .btn-secundario {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        
        .btn-secundario:hover { background: rgba(255,255,255,0.04); color: var(--text); }
        
        .error-message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
            background: rgba(220,53,69,0.12);
            border: 1px solid rgba(220,53,69,0.25);
            color: #ff6b7a;
        }
        
        .error-message.show { display: block; }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,20,25,0.97);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
        }
        
        .loading-overlay.show { display: flex; }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(197,160,89,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text { margin-top: 18px; color: rgba(255,255,255,0.6); font-size: 15px; }
        
        .footer { margin-top: 25px; color: rgba(255,255,255,0.2); font-size: 13px; }
        
        @media (max-width: 400px) {
            .login-container { margin: 12px; padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <div class="bg-fondo"></div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Conectando...</div>
    </div>
    
    <div class="login-container">
        <div class="logo">
            <img src="assets/logo.jpeg" alt="Atelier NILAR">
        </div>
        
        <h1 class="title">Atelier <span>NILAR</span></h1>
        <p class="subtitle" id="subtitle">Moda y Estilo · Inicia sesión</p>
        
        <div class="error-message" id="errorMessage"></div>
        
        <!-- LOGIN -->
        <div id="formLogin" class="form-box active">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="login()">🚀 Iniciar Sesión</button>
            <button class="btn btn-secundario" onclick="mostrarRegistro()">📝 Crear cuenta</button>
        </div>
        
        <!-- REGISTRO -->
        <div id="formRegistro" class="form-box">
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="regEmail" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="regPassword2" placeholder="Repite la contraseña">
            </div>
            <button class="btn btn-primary" onclick="crearCuenta()">✅ Crear cuenta</button>
            <button class="btn btn-secundario" onclick="mostrarLogin()">← Volver</button>
        </div>
        
        <div class="footer">Atelier NILAR · Sistema de gestión</div>
    </div>
    
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const config = { 
        apiKey: "AIzaSyB-uiv9yD-NB3Ex288Qb37Du5VgKKuDyfo",
        authDomain: "nilaratelier.firebaseapp.com",
        projectId: "nilaratelier",
        storageBucket: "nilaratelier.firebasestorage.app",
        messagingSenderId: "914021817740",
        appId: "1:914021817740:web:fc5c1ff57c1caa3f42caa9"
    };
    
    const app = initializeApp(config);
    const auth = getAuth(app);
    
    // ✅ PERSISTENCIA - Sesión dura 1 año
    await setPersistence(auth, browserLocalPersistence);
    
    // ✅ GUARDAR EMAIL para autocompletar
    const emailGuardado = localStorage.getItem('nilar_email');
    if (emailGuardado) {
        document.getElementById('email').value = emailGuardado;
    }
    
    // ✅ Solo redirige si hay sesión
    onAuthStateChanged(auth, (user) => {
        if (user) location.href = 'dashboard.html';
    });
    
    window.mostrarLogin = () => {
        document.getElementById('errorMessage').classList.remove('show');
        document.getElementById('formLogin').classList.add('active');
        document.getElementById('formRegistro').classList.remove('active');
        document.getElementById('subtitle').textContent = 'Moda y Estilo · Inicia sesión';
    };
    
    window.mostrarRegistro = () => {
        document.getElementById('errorMessage').classList.remove('show');
        document.getElementById('formLogin').classList.remove('active');
        document.getElementById('formRegistro').classList.add('active');
        document.getElementById('subtitle').textContent = 'Crea una cuenta nueva';
    };
    
    function showError(msg) {
        document.getElementById('errorMessage').textContent = msg;
        document.getElementById('errorMessage').classList.add('show');
        document.getElementById('loadingOverlay').style.display = 'none';
    }
    
    window.login = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('Ingresa correo y contraseña'); return; }
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // ✅ GUARDAR EMAIL cuando inicia
            localStorage.setItem('nilar_email', email);
        } catch(e) {
            document.getElementById('loadingOverlay').style.display = 'none';
            showError(e.code === 'auth/wrong-password' ? 'Contraseña incorrecta' : 'Error al iniciar');
        }
    };
    
    window.crearCuenta = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const password2 = document.getElementById('regPassword2').value;
        if (!email || !password || !password2) { showError('Completa todos los campos'); return; }
        if (password.length < 6) { showError('Mínimo 6 caracteres'); return; }
        if (password !== password2) { showError('Las contraseñas no coinciden'); return; }
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            await createUserWithEmailAndPassword(auth, email, password);
            // ✅ GUARDAR EMAIL cuando crea cuenta
            localStorage.setItem('nilar_email', email);
        } catch(e) {
            document.getElementById('loadingOverlay').style.display = 'none';
            showError(e.code === 'auth/email-already-in-use' ? 'Correo ya registrado' : 'Error al crear');
        }
    };
    
    document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
