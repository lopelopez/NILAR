<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Setup | NILAR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .box{background:#141414;padding:40px;border-radius:20px;text-align:center;max-width:400px;border:1px solid #c5a059}
        h1{color:#c5a059;margin-bottom:20px}
        p{color:#888;margin-bottom:20px}
        .btn{background:#c5a059;color:#000;padding:15px 30px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
        .btn:hover{background:#e8c875}
        #msg{margin-top:20px;padding:15px;border-radius:10px}
        .ok{background:rgba(34,197,94,0.2);color:#22c55e}
        .error{background:rgba(194,65,12,0.2);color:#c2410c}
    </style>
</head>
<body>
    <div class="box">
        <h1>Atelier NILAR</h1>
        <p>Configuración inicial del sistema</p>
        <button class="btn" onclick="setup()">🚀 CREAR MI CUENTA ADMIN</button>
        <div id="msg"></div>
    </div>
    <script type="module">
        import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import{getFirestore,collection,getDocs,setDoc,doc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config={apiKey:"AIzaSyB-uiv9yD-NB3Ex288Qb37Du5VgKKuDyfo",authDomain:"nilaratelier.firebaseapp.com",projectId:"nilaratelier",storageBucket:"nilaratelier.firebasestorage.app",messagingSenderId:"914021817740",appId:"1:914021817740:web:fc5c1ff57c1caa3f42caa9"};
        
        const app=initializeApp(config);
        const auth=getAuth(app);
        const db=getFirestore(app);
        
        let currentUser=null;
        
        onAuthStateChanged(auth,async user=>{
            if(!user){location.href='index.html';return}
            currentUser=user;
            document.querySelector('p').textContent='Usuario: '+user.email;
        });
        
        async function setup(){
            if(!currentUser){alert('No hay usuario');return}
            const msg=document.getElementById('msg');
            msg.textContent='Creando...';
            msg.className='';
            
            try{
                // Verificar si ya existe
                const snap=await getDocs(collection(db,'usuarios'));
                const exists=snap.docs.find(d=>d.id===currentUser.uid);
                
                if(exists){
                    msg.textContent='✅ Ya existías. Cargando...';
                    msg.className='ok';
                    setTimeout(()=>location.href='dashboard.html',1000);
                    return;
                }
                
                // Crear usuario como admin
                await setDoc(doc(db,'usuarios',currentUser.uid),{
                    email:currentUser.email,
                    rol:'admin',
                    activo:true,
                    fechaCreacion:new Date().toISOString()
                });
                
                msg.textContent='✅ ¡Admin creado! Redireccionando...';
                msg.className='ok';
                setTimeout(()=>location.href='dashboard.html',1500);
            }catch(e){
                msg.textContent='Error: '+e.message;
                msg.className='error';
            }
        }
    </script>
</body>
</html>
